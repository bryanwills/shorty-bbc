version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: shorty-postgres
    environment:
      POSTGRES_DB: shorty
      POSTGRES_USER: shorty_user
      POSTGRES_PASSWORD: shorty_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - shorty-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: shorty-redis
    ports:
      - "6379:6379"
    networks:
      - shorty-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shorty-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://shorty_user:shorty_password@postgres:5432/shorty
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:3002
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - shorty-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shorty-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - shorty-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:

networks:
  shorty-network:
    driver: bridge